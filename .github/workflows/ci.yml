name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate schemas are valid JSON Schema (draft 2020-12)
        run: |
          for schema in schemas/*.schema.json; do
            echo "Validating schema: $schema"
            ajv compile -s "$schema" --spec=draft2020 -c ajv-formats
          done

      - name: Validate examples against schemas
        run: |
          # Validate service manifests
          for example in schemas/examples/*-manifest.json; do
            echo "Validating manifest example: $example"
            ajv validate -s schemas/service-manifest.schema.json -d "$example" --spec=draft2020 -c ajv-formats
          done

          # Validate provision requests
          for example in schemas/examples/provision-request-*.json; do
            echo "Validating provision request: $example"
            ajv validate -s schemas/provision-request.schema.json -d "$example" --spec=draft2020 -c ajv-formats
          done

          # Validate provision responses
          for example in schemas/examples/provision-response-*.json; do
            echo "Validating provision response: $example"
            ajv validate -s schemas/provision-response.schema.json -d "$example" --spec=draft2020 -c ajv-formats
          done

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference-implementation/python
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -v

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference-implementation/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

  build-rust:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    if: hashFiles('osp-core/Cargo.toml') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: osp-core

      - name: Build
        working-directory: osp-core
        run: cargo build --workspace

      - name: Test
        working-directory: osp-core
        run: cargo test --workspace
