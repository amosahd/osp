services:
  registry:
    build:
      context: ../..
      dockerfile: crates/osp-registry/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - registry-data:/data
    environment:
      - PORT=8080
      - DATABASE_URL=sqlite:///data/registry.db
      - RUST_LOG=info
      - OSP_REGISTRY_ADMIN_KEY=${OSP_REGISTRY_ADMIN_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  registry-data:
