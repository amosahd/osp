[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "osp-provider"
version = "0.1.0"
description = "FastAPI router for building OSP-compliant providers"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
keywords = ["osp", "open-service-protocol", "provider", "fastapi", "ai-agents"]
dependencies = [
    "fastapi>=0.100.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "uvicorn>=0.20.0",
    "httpx>=0.24.0",
    "pytest>=7.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/osp_provider"]
